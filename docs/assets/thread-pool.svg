<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Thread Pool과 동시성 설계">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef7f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: "Malgun Gothic", "Apple SD Gothic Neo", Inter, sans-serif; fill:#172033; }
      .title { font-size: 30px; font-weight: 800; }
      .sub { font-size: 15px; fill:#526070; }
      .label { font-size: 17px; font-weight: 800; }
      .small { font-size: 13px; fill:#475569; }
      .arrow { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#64748b; stroke-width:2.5; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <text x="50" y="58" class="title">Thread Pool과 동시성 설계</text>
  <text x="52" y="86" class="sub">요청 접수는 병렬, 기존 DB 엔진 실행 구간은 mutex로 보호</text>

  <rect x="55" y="220" width="170" height="95" rx="12" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="140" y="255" text-anchor="middle" class="label">accept loop</text>
  <text x="140" y="282" text-anchor="middle" class="small">client 연결 수락</text>

  <rect x="280" y="220" width="190" height="95" rx="12" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="375" y="255" text-anchor="middle" class="label">submit</text>
  <text x="375" y="282" text-anchor="middle" class="small">thread_pool_submit()</text>

  <rect x="540" y="150" width="210" height="230" rx="16" fill="#ecfdf5" stroke="#86efac" filter="url(#shadow)"/>
  <text x="645" y="184" text-anchor="middle" class="label">bounded queue</text>
  <rect x="580" y="215" width="130" height="34" rx="7" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="645" y="238" text-anchor="middle" class="small">ClientTask #1</text>
  <rect x="580" y="260" width="130" height="34" rx="7" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="645" y="283" text-anchor="middle" class="small">ClientTask #2</text>
  <rect x="580" y="305" width="130" height="34" rx="7" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="645" y="328" text-anchor="middle" class="small">ClientTask #3</text>

  <rect x="825" y="95" width="170" height="70" rx="12" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="910" y="138" text-anchor="middle" class="label">worker 1</text>
  <rect x="825" y="190" width="170" height="70" rx="12" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="910" y="233" text-anchor="middle" class="label">worker 2</text>
  <rect x="825" y="285" width="170" height="70" rx="12" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="910" y="328" text-anchor="middle" class="label">worker 3</text>
  <rect x="825" y="380" width="170" height="70" rx="12" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="910" y="423" text-anchor="middle" class="label">worker 4</text>

  <rect x="1065" y="220" width="165" height="95" rx="12" fill="#ffedd5" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="1148" y="255" text-anchor="middle" class="label">DB mutex</text>
  <text x="1148" y="282" text-anchor="middle" class="small">SQL 실행 직렬화</text>

  <rect x="980" y="500" width="235" height="75" rx="12" fill="#fee2e2" stroke="#fca5a5" filter="url(#shadow)"/>
  <text x="1098" y="531" text-anchor="middle" class="label">기존 SQL Engine</text>
  <text x="1098" y="558" text-anchor="middle" class="small">users.tbl / users.idx 공유</text>

  <path d="M 225 268 L 275 268" class="arrow"/>
  <path d="M 470 268 L 535 268" class="arrow"/>
  <path d="M 750 250 C 790 225 790 130 820 130" class="thin"/>
  <path d="M 750 265 L 820 225" class="thin"/>
  <path d="M 750 285 L 820 320" class="thin"/>
  <path d="M 750 300 C 790 330 790 415 820 415" class="thin"/>

  <path d="M 995 130 C 1040 150 1055 220 1065 250" class="thin"/>
  <path d="M 995 225 L 1060 260" class="thin"/>
  <path d="M 995 320 L 1060 275" class="thin"/>
  <path d="M 995 415 C 1040 385 1055 315 1065 285" class="thin"/>
  <path d="M 1148 315 L 1105 495" class="arrow"/>

  <rect x="70" y="480" width="760" height="88" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="95" y="515" class="label">핵심 판단</text>
  <text x="95" y="544" class="small">worker는 여러 개라 HTTP 요청을 동시에 처리한다. 하지만 기존 DB 엔진은 공유 파일과 인덱스를 쓰므로 mutex로 보호한다.</text>
</svg>
