<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="SQL 실행 분기 흐름">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: "Malgun Gothic", "Apple SD Gothic Neo", Inter, sans-serif; fill:#172033; }
      .title { font-size:30px; font-weight:800; }
      .sub { font-size:15px; fill:#526070; }
      .label { font-size:17px; font-weight:800; }
      .small { font-size:13px; fill:#475569; }
      .arrow { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .yesno { font-size:13px; fill:#334155; font-weight:800; }
    </style>
  </defs>
  <rect width="1280" height="760" fill="#f8fafc"/>
  <text x="50" y="58" class="title">SQL 실행 분기</text>
  <text x="52" y="86" class="sub">SELECT는 id 조건이면 B+ Tree, 그 외에는 선형 탐색. INSERT는 row append 후 index 갱신</text>

  <rect x="525" y="120" width="230" height="70" rx="12" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="640" y="160" text-anchor="middle" class="label">SQL text</text>

  <rect x="495" y="245" width="290" height="78" rx="12" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="640" y="277" text-anchor="middle" class="label">sql_engine_execute_sql()</text>
  <text x="640" y="302" text-anchor="middle" class="small">Tokenizer → Parser → Optimizer</text>

  <polygon points="640,370 770,440 640,510 510,440" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="434" text-anchor="middle" class="label">statement</text>
  <text x="640" y="458" text-anchor="middle" class="label">type?</text>

  <rect x="95" y="395" width="230" height="78" rx="12" fill="#e0f2fe" stroke="#7dd3fc" filter="url(#shadow)"/>
  <text x="210" y="429" text-anchor="middle" class="label">SELECT</text>
  <text x="210" y="454" text-anchor="middle" class="small">database_execute_select()</text>

  <polygon points="210,520 340,590 210,660 80,590" fill="#fff7ed" stroke="#fdba74" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="585" text-anchor="middle" class="label">WHERE id</text>
  <text x="210" y="609" text-anchor="middle" class="label">조건?</text>

  <rect x="420" y="545" width="250" height="82" rx="12" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="545" y="578" text-anchor="middle" class="label">execute_indexed_select()</text>
  <text x="545" y="604" text-anchor="middle" class="small">B+ Tree로 id → offset 탐색</text>

  <rect x="65" y="670" width="290" height="64" rx="12" fill="#fee2e2" stroke="#fca5a5" filter="url(#shadow)"/>
  <text x="210" y="696" text-anchor="middle" class="label">execute_linear_select()</text>
  <text x="210" y="719" text-anchor="middle" class="small">users.tbl 전체 scan</text>

  <rect x="900" y="395" width="250" height="78" rx="12" fill="#ede9fe" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="1025" y="429" text-anchor="middle" class="label">INSERT</text>
  <text x="1025" y="454" text-anchor="middle" class="small">database_execute_insert()</text>

  <rect x="895" y="535" width="260" height="76" rx="12" fill="#fef3c7" stroke="#fbbf24" filter="url(#shadow)"/>
  <text x="1025" y="566" text-anchor="middle" class="label">build_insert_row()</text>
  <text x="1025" y="591" text-anchor="middle" class="small">컬럼 순서 정렬, id 자동 부여</text>

  <rect x="795" y="665" width="190" height="62" rx="12" fill="#fee2e2" stroke="#fca5a5" filter="url(#shadow)"/>
  <text x="890" y="703" text-anchor="middle" class="label">users.tbl append</text>

  <rect x="1045" y="665" width="190" height="62" rx="12" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1140" y="690" text-anchor="middle" class="label">bptree_insert()</text>
  <text x="1140" y="713" text-anchor="middle" class="small">id, row_offset</text>

  <path d="M 640 190 L 640 240" class="arrow"/>
  <path d="M 640 323 L 640 366" class="arrow"/>
  <path d="M 510 440 L 330 434" class="arrow"/>
  <text x="415" y="420" class="yesno">SELECT</text>
  <path d="M 770 440 L 895 434" class="arrow"/>
  <text x="815" y="420" class="yesno">INSERT</text>
  <path d="M 210 473 L 210 516" class="arrow"/>
  <path d="M 340 590 L 415 588" class="arrow"/>
  <text x="365" y="574" class="yesno">yes</text>
  <path d="M 210 660 L 210 666" class="arrow"/>
  <text x="170" y="656" class="yesno">no</text>
  <path d="M 1025 473 L 1025 530" class="arrow"/>
  <path d="M 1025 611 C 995 640 940 645 900 662" class="arrow"/>
  <path d="M 985 696 L 1040 696" class="arrow"/>
</svg>
