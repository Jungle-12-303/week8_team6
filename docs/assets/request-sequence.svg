<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-label="POST query 요청 처리 시퀀스">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: "Malgun Gothic", "Apple SD Gothic Neo", Inter, sans-serif; fill:#172033; }
      .title { font-size: 30px; font-weight: 800; }
      .sub { font-size: 15px; fill:#526070; }
      .actor { font-size: 15px; font-weight: 800; }
      .msg { font-size: 13px; fill:#334155; font-weight:700; }
      .note { font-size: 12px; fill:#64748b; }
      .life { stroke:#94a3b8; stroke-width:2; stroke-dasharray:8 8; }
      .arrow { stroke:#334155; stroke-width:2.5; fill:none; marker-end:url(#arrow); }
      .return { stroke:#64748b; stroke-width:2.2; stroke-dasharray:7 6; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="1280" height="820" fill="#f8fbff"/>
  <text x="50" y="58" class="title">POST /query 요청 처리 시퀀스</text>
  <text x="52" y="86" class="sub">외부 클라이언트 요청이 worker thread와 기존 SQL 엔진을 거쳐 JSON 응답으로 돌아오는 과정</text>

  <g filter="url(#shadow)">
    <rect x="48" y="125" width="145" height="58" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="218" y="125" width="145" height="58" rx="10" fill="#e0f2fe" stroke="#7dd3fc"/>
    <rect x="388" y="125" width="145" height="58" rx="10" fill="#dcfce7" stroke="#86efac"/>
    <rect x="558" y="125" width="145" height="58" rx="10" fill="#dcfce7" stroke="#86efac"/>
    <rect x="728" y="125" width="145" height="58" rx="10" fill="#fef9c3" stroke="#fde047"/>
    <rect x="898" y="125" width="145" height="58" rx="10" fill="#ede9fe" stroke="#c4b5fd"/>
    <rect x="1068" y="125" width="160" height="58" rx="10" fill="#ffe4e6" stroke="#fda4af"/>
  </g>

  <text x="120" y="160" text-anchor="middle" class="actor">Thunder</text>
  <text x="290" y="160" text-anchor="middle" class="actor">API Server</text>
  <text x="460" y="160" text-anchor="middle" class="actor">Queue</text>
  <text x="630" y="160" text-anchor="middle" class="actor">Worker</text>
  <text x="800" y="160" text-anchor="middle" class="actor">DbApi</text>
  <text x="970" y="160" text-anchor="middle" class="actor">SQL Engine</text>
  <text x="1148" y="160" text-anchor="middle" class="actor">Storage/B+Tree</text>

  <line x1="120" y1="183" x2="120" y2="760" class="life"/>
  <line x1="290" y1="183" x2="290" y2="760" class="life"/>
  <line x1="460" y1="183" x2="460" y2="760" class="life"/>
  <line x1="630" y1="183" x2="630" y2="760" class="life"/>
  <line x1="800" y1="183" x2="800" y2="760" class="life"/>
  <line x1="970" y1="183" x2="970" y2="760" class="life"/>
  <line x1="1148" y1="183" x2="1148" y2="760" class="life"/>

  <path d="M 120 225 L 290 225" class="arrow"/>
  <text x="205" y="214" text-anchor="middle" class="msg">POST /query, SQL body</text>

  <path d="M 290 280 L 460 280" class="arrow"/>
  <text x="375" y="269" text-anchor="middle" class="msg">ClientTask 등록</text>

  <path d="M 460 335 L 630 335" class="arrow"/>
  <text x="545" y="324" text-anchor="middle" class="msg">worker가 task pop</text>

  <rect x="548" y="365" width="164" height="72" rx="10" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="630" y="391" text-anchor="middle" class="msg">read_http_request()</text>
  <text x="630" y="414" text-anchor="middle" class="note">method/path/body 읽기</text>

  <rect x="548" y="455" width="164" height="72" rx="10" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="630" y="481" text-anchor="middle" class="msg">extract_sql_text()</text>
  <text x="630" y="504" text-anchor="middle" class="note">raw SQL 또는 JSON</text>

  <path d="M 630 555 L 800 555" class="arrow"/>
  <text x="715" y="544" text-anchor="middle" class="msg">db_api_execute_sql()</text>

  <rect x="718" y="580" width="164" height="54" rx="10" fill="#fff7ed" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="800" y="612" text-anchor="middle" class="msg">mutex_lock()</text>

  <path d="M 800 665 L 970 665" class="arrow"/>
  <text x="885" y="654" text-anchor="middle" class="msg">sql_engine_execute_sql()</text>

  <path d="M 970 710 L 1148 710" class="arrow"/>
  <text x="1059" y="699" text-anchor="middle" class="msg">SELECT / INSERT</text>

  <path d="M 1148 745 L 970 745" class="return"/>
  <text x="1059" y="735" text-anchor="middle" class="note">CSV result + stats</text>

  <path d="M 970 775 L 800 775" class="return"/>
  <text x="885" y="765" text-anchor="middle" class="note">성공/실패, FILE* 결과 캡처</text>

  <path d="M 800 730 C 755 708 755 680 800 658" class="return"/>
  <text x="720" y="704" text-anchor="middle" class="note">mutex_unlock()</text>

  <path d="M 800 610 C 715 632 690 650 630 665" class="return"/>
  <text x="704" y="640" text-anchor="middle" class="note">DbApiResult(output, stats)</text>

  <path d="M 630 700 L 120 700" class="return"/>
  <text x="375" y="688" text-anchor="middle" class="msg">HTTP 200/400 JSON response</text>
</svg>
