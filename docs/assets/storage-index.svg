<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="680" viewBox="0 0 1280 680" role="img" aria-label="데이터 저장 구조">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: "Malgun Gothic", "Apple SD Gothic Neo", Inter, sans-serif; fill:#172033; }
      .title { font-size:30px; font-weight:800; }
      .sub { font-size:15px; fill:#526070; }
      .head { font-size:19px; font-weight:800; }
      .row { font-size:14px; fill:#334155; }
      .small { font-size:13px; fill:#475569; }
      .arrow { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#64748b; stroke-width:2.5; stroke-dasharray:8 7; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="1280" height="680" fill="#f8fafc"/>
  <text x="50" y="58" class="title">데이터 저장 구조: users.tbl + users.idx</text>
  <text x="52" y="86" class="sub">B+ Tree는 row 자체가 아니라 users.tbl 안의 파일 offset을 저장한다.</text>

  <rect x="70" y="140" width="510" height="430" rx="16" fill="#fff7ed" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="325" y="180" text-anchor="middle" class="head">users.tbl</text>
  <text x="325" y="207" text-anchor="middle" class="small">CSV row data</text>

  <rect x="105" y="240" width="440" height="50" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="125" y="270" class="row">offset 0: id,name,email,age</text>
  <rect x="105" y="310" width="440" height="50" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="125" y="340" class="row">offset 22: 1,Alice,a@example.com,20</text>
  <rect x="105" y="380" width="440" height="50" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="125" y="410" class="row">offset 51: 2,Bob,b@example.com,25</text>
  <rect x="105" y="450" width="440" height="58" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="125" y="475" class="row">offset 41378200:</text>
  <text x="125" y="497" class="row">777777,CHOIHYUNJIN,guswls1478@gmail.com,24</text>

  <rect x="720" y="140" width="490" height="430" rx="16" fill="#ecfdf5" stroke="#86efac" filter="url(#shadow)"/>
  <text x="965" y="180" text-anchor="middle" class="head">users.idx</text>
  <text x="965" y="207" text-anchor="middle" class="small">B+ Tree page file</text>

  <rect x="770" y="245" width="390" height="70" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="965" y="275" text-anchor="middle" class="row">root / internal page</text>
  <text x="965" y="297" text-anchor="middle" class="small">key 범위로 leaf page 선택</text>

  <rect x="760" y="370" width="125" height="70" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="822" y="399" text-anchor="middle" class="row">key 1</text>
  <text x="822" y="421" text-anchor="middle" class="small">offset 22</text>
  <rect x="902" y="370" width="125" height="70" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="965" y="399" text-anchor="middle" class="row">key 2</text>
  <text x="965" y="421" text-anchor="middle" class="small">offset 51</text>
  <rect x="1045" y="370" width="125" height="70" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="1108" y="399" text-anchor="middle" class="row">key 777777</text>
  <text x="1108" y="421" text-anchor="middle" class="small">offset 41378200</text>

  <path d="M 965 315 L 822 366" class="arrow"/>
  <path d="M 965 315 L 965 366" class="arrow"/>
  <path d="M 965 315 L 1108 366" class="arrow"/>

  <path d="M 760 405 C 640 405 640 335 550 335" class="dash"/>
  <path d="M 902 405 C 650 430 650 405 550 405" class="dash"/>
  <path d="M 1045 405 C 720 560 590 490 550 488" class="dash"/>

  <rect x="375" y="600" width="530" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="631" text-anchor="middle" class="head">WHERE id = 777777 → B+ Tree에서 offset 찾기 → users.tbl 해당 위치로 fseek</text>
</svg>
