<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Mini DBMS API Server 전체 아키텍처">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dff0ff"/>
      <stop offset="100%" stop-color="#a9d4ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7f8ef"/>
      <stop offset="100%" stop-color="#aee5c5"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8d7"/>
      <stop offset="100%" stop-color="#f3dc83"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe7e2"/>
      <stop offset="100%" stop-color="#ffb7a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: "Malgun Gothic", "Apple SD Gothic Neo", Inter, sans-serif; fill:#172033; }
      .title { font-size: 30px; font-weight: 800; }
      .sub { font-size: 15px; fill:#526070; }
      .layer { font-size: 18px; font-weight: 800; fill:#263445; }
      .boxTitle { font-size: 18px; font-weight: 800; }
      .boxBody { font-size: 13px; fill:#334155; }
      .arrowText { font-size: 13px; fill:#475569; font-weight:700; }
      .line { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#64748b; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
      .return { stroke:#0f766e; stroke-width:3; fill:none; stroke-dasharray:7 5; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="50" y="58" class="title">Week8 Mini DBMS API Server - 전체 아키텍처</text>
  <text x="52" y="86" class="sub">외부 HTTP 요청 → worker → db_api.c → 기존 SQL 엔진 → db_api.c(DbApiResult) → api_server.c(JSON) → HTTP 응답</text>

  <rect x="45" y="130" width="170" height="110" rx="12" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="130" y="166" text-anchor="middle" class="boxTitle">Thunder Client</text>
  <text x="130" y="194" text-anchor="middle" class="boxBody">POST /query</text>
  <text x="130" y="216" text-anchor="middle" class="boxBody">SQL body</text>

  <rect x="275" y="115" width="210" height="150" rx="14" fill="url(#blue)" stroke="#6aa8e8" filter="url(#shadow)"/>
  <text x="380" y="146" text-anchor="middle" class="layer">API Server Layer</text>
  <text x="380" y="181" text-anchor="middle" class="boxTitle">api_server.c</text>
  <text x="380" y="207" text-anchor="middle" class="boxBody">HTTP parsing</text>
  <text x="380" y="229" text-anchor="middle" class="boxBody">routing, JSON response</text>

  <rect x="540" y="115" width="210" height="150" rx="14" fill="url(#green)" stroke="#56b87b" filter="url(#shadow)"/>
  <text x="645" y="146" text-anchor="middle" class="layer">Concurrency Layer</text>
  <text x="645" y="181" text-anchor="middle" class="boxTitle">Thread Pool</text>
  <text x="645" y="207" text-anchor="middle" class="boxBody">bounded queue</text>
  <text x="645" y="229" text-anchor="middle" class="boxBody">worker executes handle_client()</text>

  <rect x="805" y="115" width="210" height="150" rx="14" fill="url(#yellow)" stroke="#d2a92e" filter="url(#shadow)"/>
  <text x="910" y="146" text-anchor="middle" class="layer">DB Adapter Layer</text>
  <text x="910" y="181" text-anchor="middle" class="boxTitle">db_api.c</text>
  <text x="910" y="207" text-anchor="middle" class="boxBody">mutex 보호</text>
  <text x="910" y="229" text-anchor="middle" class="boxBody">SQL 엔진 호출/결과 캡처</text>

  <rect x="1080" y="115" width="150" height="150" rx="14" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="1155" y="154" text-anchor="middle" class="boxTitle">api_server.c</text>
  <text x="1155" y="181" text-anchor="middle" class="boxBody">JSON response</text>
  <text x="1155" y="204" text-anchor="middle" class="boxBody">columns, rows</text>
  <text x="1155" y="226" text-anchor="middle" class="boxBody">stats</text>

  <path d="M 215 185 L 270 185" class="line"/>
  <text x="242" y="172" text-anchor="middle" class="arrowText">HTTP</text>
  <path d="M 485 185 L 535 185" class="line"/>
  <text x="510" y="172" text-anchor="middle" class="arrowText">task</text>
  <path d="M 750 185 L 800 185" class="line"/>
  <text x="775" y="172" text-anchor="middle" class="arrowText">SQL</text>
  <path d="M 1015 185 L 1075 185" class="line"/>
  <text x="1045" y="172" text-anchor="middle" class="arrowText">DbApiResult 반환</text>

  <rect x="230" y="355" width="820" height="145" rx="16" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="640" y="388" text-anchor="middle" class="layer">Existing SQL Engine</text>
  <rect x="275" y="415" width="145" height="48" rx="10" fill="#eef6ff" stroke="#8bbcf0"/>
  <text x="347" y="445" text-anchor="middle" class="boxTitle">Tokenizer</text>
  <rect x="465" y="415" width="145" height="48" rx="10" fill="#eef6ff" stroke="#8bbcf0"/>
  <text x="537" y="445" text-anchor="middle" class="boxTitle">Parser</text>
  <rect x="655" y="415" width="145" height="48" rx="10" fill="#eef6ff" stroke="#8bbcf0"/>
  <text x="727" y="445" text-anchor="middle" class="boxTitle">Optimizer</text>
  <rect x="845" y="415" width="145" height="48" rx="10" fill="#eef6ff" stroke="#8bbcf0"/>
  <text x="917" y="445" text-anchor="middle" class="boxTitle">Executor</text>
  <path d="M 420 439 L 460 439" class="thin"/>
  <path d="M 610 439 L 650 439" class="thin"/>
  <path d="M 800 439 L 840 439" class="thin"/>

  <path d="M 910 265 C 910 315 710 310 640 355" class="line"/>
  <text x="790" y="315" text-anchor="middle" class="arrowText">SQL 엔진 호출</text>
  <path d="M 650 355 C 715 320 875 320 895 265" class="return"/>
  <text x="773" y="344" text-anchor="middle" class="arrowText">엔진 출력 캡처</text>

  <rect x="275" y="585" width="270" height="100" rx="14" fill="url(#red)" stroke="#e87b65" filter="url(#shadow)"/>
  <text x="410" y="621" text-anchor="middle" class="layer">users.tbl</text>
  <text x="410" y="651" text-anchor="middle" class="boxBody">CSV row data</text>
  <text x="410" y="672" text-anchor="middle" class="boxBody">id,name,email,age</text>

  <rect x="735" y="585" width="270" height="100" rx="14" fill="url(#red)" stroke="#e87b65" filter="url(#shadow)"/>
  <text x="870" y="621" text-anchor="middle" class="layer">users.idx</text>
  <text x="870" y="651" text-anchor="middle" class="boxBody">B+ Tree index</text>
  <text x="870" y="672" text-anchor="middle" class="boxBody">key=id, value=file offset</text>

  <path d="M 847 500 C 760 545 548 545 445 585" class="line"/>
  <path d="M 930 500 C 940 545 900 545 885 585" class="line"/>
  <path d="M 735 635 L 550 635" class="line"/>
  <text x="642" y="620" text-anchor="middle" class="arrowText">offset으로 row 이동</text>
</svg>
